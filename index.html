<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Virtual - EDUX IMPORT</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card {
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            animation: marquee 30s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header / Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <img id="logo" src="https://via.placeholder.com/150x50" alt="Logo" class="h-12 w-auto">
                    <h1 id="site-name" class="ml-4 text-2xl font-bold text-black">Catálogo</h1>
                </div>
                <div class="hidden md:flex items-center space-x-6" id="social-links-desktop">
                    <!-- Social links will be injected here -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-blue-600 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h2 id="hero-title" class="text-4xl font-extrabold mb-4">Descubre Nuestras Ofertas</h2>
            <p id="hero-subtitle" class="text-xl text-blue-100">Las mejores marcas y productos a un solo clic.</p>
        </div>
    </header>

    <!-- Announcement Ribbon (Marquee) - Moved here -->
    <div id="announcement-ribbon" class="hidden overflow-hidden whitespace-nowrap py-3 relative border-y border-gray-100 shadow-sm">
        <div id="ribbon-content" class="inline-block animate-marquee uppercase text-[11px] font-bold tracking-widest">
            <!-- Text injected here -->
        </div>
        <div id="ribbon-content-clone" class="inline-block animate-marquee uppercase text-[11px] font-bold tracking-widest">
            <!-- Text injected here (cloned for seamless loop) -->
        </div>
    </div>

    <!-- Search and Filters -->
    <section class="max-w-7xl mx-auto px-4 mt-8">
        <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-96">
                <input type="text" id="search-input" placeholder="Buscar productos..." 
                    class="w-full px-4 py-2 pl-10 pr-4 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
            <div class="flex gap-2" id="category-filters">
                <!-- Categories will be injected here -->
                <button class="px-4 py-2 rounded-full bg-blue-600 text-white text-sm font-medium" onclick="filterCategory('all')">Todos</button>
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <main class="max-w-7xl mx-auto px-4 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Products will be injected here by script.js -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 pt-12 pb-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8 mb-8">
                <div>
                    <img id="footer-logo" src="https://via.placeholder.com/150x50" alt="Logo" class="h-10 mb-4 mx-auto md:mx-0">
                    <p class="text-gray-500 max-w-xs text-center md:text-left">Tu tienda de confianza para importaciones y productos exclusivos.</p>
                </div>
                <div class="flex flex-col items-center md:items-end gap-4">
                    <h3 class="font-bold text-lg">Contáctanos</h3>
                    <div class="flex space-x-4" id="social-links-footer">
                        <!-- Social links will be injected here -->
                    </div>
                </div>
            </div>
            <div class="border-t border-gray-100 pt-8 text-center text-gray-400 text-sm">
                <p>&copy; <span id="current-year"></span> <span id="footer-site-name">Ada Importaciones</span>. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- WhatsApp Floating Button -->
    <a id="whatsapp-float" href="#" target="_blank" class="fixed bottom-8 right-8 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg hover:bg-green-600 transition-colors z-50">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="script.js"></script>
    <script>
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("init", user => {
            if (!user) {
              window.netlifyIdentity.on("login", () => {
                document.location.href = "/admin/";
              });
            }
          });
        }
    </script>
</body>
</html>
